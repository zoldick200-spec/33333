<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Boss Spawn Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 700;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 0.95rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #fff;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background-color: var(--card-bg);
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #0f172a;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .cd {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
        }

        .cd.imminent {
            color: var(--warning);
            animation: pulse 1s infinite alternate;
        }

        .cd.due {
            color: var(--danger);
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        .action-btn.del:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🐉 Mirage Boss Spawn Timer</h1>
        <p class="subtitle">Track boss spawn times and countdowns in real-time</p>
    </header>

    <div class="card">
        <form id="bossForm" onsubmit="addBoss(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="b">Boss Name</label>
                    <input id="b" placeholder="e.g. Mirage Dragon" required>
                </div>
                <div class="form-group">
                    <label for="w">World / Server</label>
                    <input id="w" placeholder="e.g. World 1" required>
                </div>
                <div class="form-group">
                    <label for="l">Location</label>
                    <input id="l" placeholder="e.g. Desert Oasis" required>
                </div>
                <div class="form-group">
                    <label for="t">Spawn Times (Comma separated)</label>
                    <input id="t" placeholder="e.g. 2:00 PM, 20:00, 8:00" required>
                </div>
            </div>
            <div class="btn-group">
                <!-- Hidden file input triggered by button -->
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importFromFile(event)">
                
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Load File</button>
                <button type="button" class="btn btn-secondary" onclick="exportToFile()">Backup File</button>
                <button type="submit" class="btn">Add Boss</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Boss</th>
                    <th>World</th>
                    <th>Location</th>
                    <th>Next Spawn</th>
                    <th>Countdown</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tb">
            </tbody>
        </table>
    </div>
</div>

<script>
let bosses = JSON.parse(localStorage.getItem('bosses') || '[]');

function save() {
    localStorage.setItem('bosses', JSON.stringify(bosses));
}

function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Flexible Time Parser
function parseTimeToToday(timeStr) {
    if (!timeStr) return null;
    let match = timeStr.trim().match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?$/i);
    if (!match) return null;

    let [, hoursStr, minutesStr, period] = match;
    let hours = parseInt(hoursStr, 10);
    let minutes = minutesStr ? parseInt(minutesStr, 10) : 0;

    if (isNaN(hours) || isNaN(minutes) || minutes < 0 || minutes > 59) return null;

    if (period) {
        period = period.toUpperCase();
        if (hours < 1 || hours > 12) return null;
        if (period === 'PM' && hours < 12) hours += 12;
        if (period === 'AM' && hours === 12) hours = 0;
    } else {
        if (hours < 0 || hours > 23) return null;
    }

    let d = new Date();
    d.setHours(hours, minutes, 0, 0);
    return d;
}

function render() {
    const tb = document.getElementById('tb');
    tb.innerHTML = '';

    if (bosses.length === 0) {
        tb.innerHTML = `<tr><td colspan="6" class="empty-state">No bosses added yet. Add one using the form above!</td></tr>`;
        return;
    }

    bosses.forEach((x, i) => {
        let r = tb.insertRow();
        r.dataset.index = i;
        r.dataset.times = x.times;
        r.innerHTML = `
            <td><strong>${escapeHtml(x.b)}</strong></td>
            <td>${escapeHtml(x.w)}</td>
            <td>${escapeHtml(x.l)}</td>
            <td class="next">-</td>
            <td class="cd">-</td>
            <td class="actions">
                <button class="action-btn" onclick="editBoss(${i})">Edit</button>
                <button class="action-btn del" onclick="delBoss(${i})">Delete</button>
            </td>
        `;
    });
    update();
}

function addBoss(e) {
    e.preventDefault();
    const bInput = document.getElementById('b');
    const wInput = document.getElementById('w');
    const lInput = document.getElementById('l');
    const tInput = document.getElementById('t');

    bosses.push({
        b: bInput.value.trim(),
        w: wInput.value.trim(),
        l: lInput.value.trim(),
        times: tInput.value.trim()
    });

    save();

    bInput.value = '';
    wInput.value = '';
    lInput.value = '';
    tInput.value = '';

    render();
}

function editBoss(i) {
    let x = bosses[i];
    let nb = prompt('Boss Name:', x.b); if (nb === null) return;
    let nw = prompt('World / Server:', x.w); if (nw === null) return;
    let nl = prompt('Location:', x.l); if (nl === null) return;
    let nt = prompt('Spawn Times (comma-separated):', x.times); if (nt === null) return;

    bosses[i] = { b: nb.trim(), w: nw.trim(), l: nl.trim(), times: nt.trim() };
    save();
    render();
}

function delBoss(i) {
    if (confirm(`Delete ${bosses[i].b}?`)) {
        bosses.splice(i, 1);
        save();
        render();
    }
}

// Export data as a downloadable JSON file
function exportToFile() {
    if (bosses.length === 0) {
        alert("No boss data to export!");
        return;
    }
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bosses, null, 2));
    const downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", `mirage_bosses_${new Date().toISOString().slice(0,10)}.json`);
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
}

// Import data from a selected .json file
function importFromFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const parsed = JSON.parse(e.target.result);
            if (Array.isArray(parsed)) {
                bosses = parsed;
                save();
                render();
                alert("Boss list imported successfully!");
            } else {
                alert("Invalid file format. Expected a JSON list of bosses.");
            }
        } catch (err) {
            alert("Error parsing JSON file: " + err.message);
        }
        event.target.value = '';
    };
    reader.readAsText(file);
}

function update() {
    let now = new Date();
    let rows = [...document.querySelectorAll('#tb tr')].filter(r => r.dataset.times);

    let rowData = [];

    rows.forEach(r => {
        let rawTimes = r.dataset.times.split(',');
        
        let dates = rawTimes
            .map(parseTimeToToday)
            .filter(Boolean)
            .sort((a, b) => a - b);

        if (dates.length === 0) {
            r.querySelector('.next').textContent = 'Invalid Time';
            r.querySelector('.cd').textContent = '--:--:--';
            rowData.push({ row: r, diff: Infinity });
            return;
        }

        let nextSpawn = dates.find(d => d > now);

        if (!nextSpawn) {
            nextSpawn = new Date(dates[0]);
            nextSpawn.setDate(nextSpawn.getDate() + 1);
        }

        let diff = nextSpawn - now;
        let H = Math.floor(diff / 36e5);
        let M = Math.floor((diff % 36e5) / 6e4);
        let S = Math.floor((diff % 6e4) / 1e3);

        const cdEl = r.querySelector('.cd');
        cdEl.textContent = `${String(H).padStart(2, '0')}:${String(M).padStart(2, '0')}:${String(S).padStart(2, '0')}`;
        
        if (diff <= 300000 && diff > 0) {
            cdEl.className = 'cd imminent';
        } else if (diff <= 0) {
            cdEl.className = 'cd due';
        } else {
            cdEl.className = 'cd';
        }

        r.querySelector('.next').textContent = nextSpawn.toLocaleTimeString([], {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });

        rowData.push({ row: r, diff: diff });
    });

    // Check if table reordering is actually required before altering DOM
    let needsReorder = false;
    for (let i = 0; i < rowData.length - 1; i++) {
        if (rowData[i].diff > rowData[i + 1].diff) {
            needsReorder = true;
            break;
        }
    }

    if (needsReorder) {
        const tb = document.getElementById('tb');
        rowData.sort((a, b) => a.diff - b.diff);
        rowData.forEach(item => tb.appendChild(item.row));
    }
}

render();
setInterval(update, 1000);
</script>
</body>
</html>
