<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Boss Spawn Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 700;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 0.95rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #fff;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background-color: var(--card-bg);
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #0f172a;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .cd {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
        }

        .cd.imminent {
            color: var(--warning);
            animation: pulse 1s infinite alternate;
        }

        .cd.due {
            color: var(--danger);
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        .action-btn.del:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }

        .times-list {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        <input 
id="search" 
placeholder="🔍 Search boss, world, location..."
oninput="searchBoss()">
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🐉 Mirage Boss Spawn Timer</h1>
        <p class="subtitle">Track boss spawn times and countdowns in real-time</p>
    </header>

    <div class="card">
        <form id="bossForm" onsubmit="addBoss(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="b">Boss Name</label>
                    <input id="b" placeholder="e.g. Mirage Dragon" required>
                </div>
                <div class="form-group">
                    <label for="w">World / Server</label>
                    <input id="w" placeholder="e.g. World 1" required>
                </div>
                <div class="form-group">
                    <label for="l">Location</label>
                    <input id="l" placeholder="e.g. Desert Oasis" required>
                </div>
                <div class="form-group">
                    <label for="t">Spawn Times (Comma separated)</label>
                    <input id="t" placeholder="e.g. 2:00 PM, 8:00 PM" required>
                </div>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="exportImportModal()">Backup / Load</button>
                <button type="submit" class="btn">Add Boss</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Boss</th>
                    <th>World</th>
                    <th>Location</th>
                    <th>Next Spawn</th>
                    <th>Countdown</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tb">
            </tbody>
        </table>
    </div>
</div>

<script>
let bosses = JSON.parse(localStorage.getItem('bosses') || '[]');

function save() {
    localStorage.setItem('bosses', JSON.stringify(bosses));
}

// Fixed 12-hour / 24-hour time parser
function parseTimeToToday(timeStr) {
    if (!timeStr) return null;
    let match = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)?$/i);
    if (!match) return null;

    let [, hoursStr, minutesStr, period] = match;
    let hours = parseInt(hoursStr, 10);
    let minutes = parseInt(minutesStr, 10);

    if (isNaN(hours) || isNaN(minutes) || hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
        return null;
    }

    if (period) {
        period = period.toUpperCase();
        if (period === 'PM' && hours < 12) hours += 12;
        if (period === 'AM' && hours === 12) hours = 0;
    }

    let d = new Date();
    d.setHours(hours, minutes, 0, 0);
    return d;
}

function render() {
    const tb = document.getElementById('tb');
    tb.innerHTML = '';

    if (bosses.length === 0) {
        tb.innerHTML = `<tr><td colspan="6" class="empty-state">No bosses added yet. Add one using the form above!</td></tr>`;
        return;
    }

    bosses.forEach((x, i) => {
        let r = tb.insertRow();
        r.dataset.index = i;
        r.dataset.times = x.times;
        r.innerHTML = `
            <td><strong>${escapeHtml(x.b)}</strong></td>
            <td>${escapeHtml(x.w)}</td>
            <td>${escapeHtml(x.l)}</td>
            <td class="next">-</td>
            <td class="cd">-</td>
            <td class="actions">
                <button class="action-btn" onclick="editBoss(${i})">Edit</button>
                <button class="action-btn del" onclick="delBoss(${i})">Delete</button>
            </td>
        `;
    });
    update();
}

function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addBoss(e) {
    e.preventDefault();
    const bInput = document.getElementById('b');
    const wInput = document.getElementById('w');
    const lInput = document.getElementById('l');
    const tInput = document.getElementById('t');

    // Parse comma-separated inputs and auto-expand pure times without AM/PM into both AM and PM
    let rawVals = tInput.value.split(',');
    let vals = [];

    rawVals.forEach(v => {
        v = v.trim();
        if (!v) return;
        if (/am|pm/i.test(v)) {
            vals.push(v);
        } else {
            vals.push(v + ' AM');
            vals.push(v + ' PM');
        }
    });

    bosses.push({
        b: bInput.value.trim(),
        w: wInput.value.trim(),
        l: lInput.value.trim(),
        times: vals.join(', ')
    });

    save();
    render();

    bInput.value = '';
    wInput.value = '';
    lInput.value = '';
    tInput.value = '';
}

function editBoss(i) {
    let x = bosses[i];
    let nb = prompt('Boss Name:', x.b); if (nb === null) return;
    let nw = prompt('World / Server:', x.w); if (nw === null) return;
    let nl = prompt('Location:', x.l); if (nl === null) return;
    let nt = prompt('Spawn Times (comma-separated):', x.times); if (nt === null) return;

    bosses[i] = { b: nb.trim(), w: nw.trim(), l: nl.trim(), times: nt.trim() };
    save();
    render();
}

function delBoss(i) {
    if (confirm(`Delete ${bosses[i].b}?`)) {
        bosses.splice(i, 1);
        save();
        render();
    }
}

function exportImportModal() {
    let action = prompt("Type 'export' to copy data JSON or 'import' to paste data JSON:", "export");
    if (!action) return;

    if (action.toLowerCase() === 'export') {
        prompt("Copy your backup data:", JSON.stringify(bosses));
    } else if (action.toLowerCase() === 'import') {
        let jsonStr = prompt("Paste your backup JSON:");
        if (jsonStr) {
            try {
                let parsed = JSON.parse(jsonStr);
                if (Array.isArray(parsed)) {
                    bosses = parsed;
                    save();
                    render();
                    alert("Boss list imported successfully!");
                } else {
                    alert("Invalid data format.");
                }
            } catch (err) {
                alert("Failed to parse JSON: " + err.message);
            }
        }
    }
}

function update() {
    let now = new Date();
    let rows = [...document.querySelectorAll('#tb tr')].filter(r => r.dataset.times);

    rows.forEach(r => {
        let rawTimes = r.dataset.times.split(',');
        
        let dates = rawTimes
            .map(parseTimeToToday)
            .filter(Boolean)
            .sort((a, b) => a - b);

        if (dates.length === 0) {
            r.querySelector('.next').textContent = 'Invalid Time';
            r.querySelector('.cd').textContent = '--:--:--';
            r.dataset.diff = 999999999999;
            return;
        }

        let nextSpawn = dates.find(d => d > now);

        if (!nextSpawn) {
            nextSpawn = new Date(dates[0]);
            nextSpawn.setDate(nextSpawn.getDate() + 1);
        }

        let diff = nextSpawn - now;
        let H = Math.floor(diff / 36e5);
        let M = Math.floor((diff % 36e5) / 6e4);
        let S = Math.floor((diff % 6e4) / 1e3);

        const cdEl = r.querySelector('.cd');
        cdEl.textContent = `${String(H).padStart(2, '0')}:${String(M).padStart(2, '0')}:${String(S).padStart(2, '0')}`;
        
        if (diff <= 300000 && diff > 0) { // under 5 mins
            cdEl.className = 'cd imminent';
        } else if (diff <= 0) {
            cdEl.className = 'cd due';
        } else {
            cdEl.className = 'cd';
        }

        r.querySelector('.next').textContent = nextSpawn.toLocaleTimeString([], {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });

        r.dataset.diff = diff;
    });

    // Sort rows dynamically by shortest remaining time
    const tb = document.getElementById('tb');
    rows.sort((a, b) => Number(a.dataset.diff) - Number(b.dataset.diff));
    rows.forEach(r => tb.appendChild(r));
}

render();
setInterval(update, 1000);
</script>
</body>
</html>
