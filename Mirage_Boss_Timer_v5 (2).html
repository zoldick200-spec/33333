<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Boss Spawn Timer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
            --spawned-bg: rgba(245, 158, 11, 0.15);
            --spawned-border: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px 16px;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input, select {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .search-bar {
            margin-bottom: 16px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .btn {
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 700;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 0.95rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #fff;
        }

        .btn-audio {
            background-color: #334155;
            color: #fff;
        }

        .btn-audio.active {
            background-color: var(--success);
            color: #0f172a;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background-color: var(--card-bg);
        }

        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #0f172a;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        tr.completed {
            opacity: 0.4;
        }

        /* SPAWNED HIGHLIGHT STYLE (5 MINUTES) */
        tr.spawned-highlight {
            background-color: var(--spawned-bg) !important;
            animation: spawnPulse 2s infinite alternate;
        }

        tr.spawned-highlight td {
            border-bottom: 1px solid var(--spawned-border);
        }

        @keyframes spawnPulse {
            0% { background-color: rgba(245, 158, 11, 0.1); }
            100% { background-color: rgba(245, 158, 11, 0.35); }
        }

        .spawn-badge {
            display: inline-block;
            background-color: var(--warning);
            color: #0f172a;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .checkbox-cell {
            text-align: center;
        }

        .checkbox-cell input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .cd {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
        }

        .cd.imminent {
            color: var(--warning);
            animation: pulse 1s infinite alternate;
        }

        .cd.due {
            color: var(--danger);
            font-size: 1.15rem;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .alarm-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            opacity: 0.35;
            transition: opacity 0.2s, transform 0.1s;
            padding: 4px;
        }

        .alarm-toggle.active {
            opacity: 1;
            transform: scale(1.15);
        }

        .alarm-settings-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .alarm-select {
            padding: 4px 6px;
            font-size: 0.75rem;
            width: auto;
            border-radius: 4px;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        .action-btn.del:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }

        .reset-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🐉 Mirage Boss Spawn Timer</h1>
        <p class="subtitle">Track boss spawn times and countdowns in real-time</p>
    </header>

    <div class="card">
        <form id="bossForm" onsubmit="addBoss(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="b">Boss Name</label>
                    <input id="b" placeholder="e.g. Mirage Dragon" required>
                </div>
                <div class="form-group">
                    <label for="w">World / Server</label>
                    <input id="w" placeholder="e.g. World 1" required>
                </div>
                <div class="form-group">
                    <label for="l">Location</label>
                    <input id="l" placeholder="e.g. Desert Oasis" required>
                </div>
                <div class="form-group">
                    <label for="t">Spawn Times (Comma separated)</label>
                    <input id="t" placeholder="e.g. 2:00 PM, 20:00, 8:00 AM" required>
                </div>
            </div>
            <div class="btn-group">
                <button type="button" id="audioToggle" class="btn btn-audio" onclick="toggleGlobalAudio()">🔊 Sound: OFF</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importFromFile(event)">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📁 Load File</button>
                <button type="button" class="btn btn-secondary" onclick="exportToFile()">💾 Save File</button>
                <button type="submit" class="btn">Add Boss</button>
            </div>
        </form>
    </div>

    <div class="search-bar">
        <input id="search" placeholder="🔍 Search boss, world, location..." oninput="searchBoss()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="text-align: center;">Done</th>
                    <th style="text-align: center;">Alarm</th>
                    <th>Boss</th>
                    <th>World</th>
                    <th>Location</th>
                    <th>Next Spawn</th>
                    <th>Countdown</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tb">
            </tbody>
        </table>
    </div>
    <div class="reset-info">💡 Checkbox auto-resets every Sunday at 11:00 PM GMT+8</div>
</div>

<script>
let bosses = JSON.parse(localStorage.getItem('bosses') || '[]');
let audioEnabled = false;
let audioCtx = null;
let triggeredAlarms = {};

function save() {
    localStorage.setItem('bosses', JSON.stringify(bosses));
}

function toggleGlobalAudio() {
    audioEnabled = !audioEnabled;
    const btn = document.getElementById('audioToggle');
    if (audioEnabled) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btn.textContent = "🔊 Sound: ON";
        btn.classList.add('active');
        playBeep();
    } else {
        btn.textContent = "🔊 Sound: OFF";
        btn.classList.remove('active');
    }
}

function playBeep() {
    if (!audioEnabled || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.2);
    } catch (e) {
        console.error("Audio error:", e);
    }
}

function getLastResetTimestamp() {
    let now = new Date();
    let utcMs = now.getTime() + (now.getTimezoneOffset() * 60000);
    let gmt8Now = new Date(utcMs + (8 * 3600000));

    let day = gmt8Now.getDay();
    let hours = gmt8Now.getHours();

    let daysToSubtract = day;
    if (day === 0 && hours < 23) {
        daysToSubtract = 7;
    }

    let lastResetGMT8 = new Date(gmt8Now);
    lastResetGMT8.setDate(gmt8Now.getDate() - daysToSubtract);
    lastResetGMT8.setHours(23, 0, 0, 0);

    return lastResetGMT8.getTime() - (8 * 3600000);
}

function parseTimeToToday(timeStr) {
    if (!timeStr) return null;
    let match = timeStr.trim().match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?$/i);
    if (!match) return null;

    let [, hoursStr, minutesStr, period] = match;
    let hours = parseInt(hoursStr, 10);
    let minutes = minutesStr ? parseInt(minutesStr, 10) : 0;

    if (isNaN(hours) || isNaN(minutes) || minutes < 0 || minutes > 59) return null;

    if (period) {
        period = period.toUpperCase();
        if (hours < 1 || hours > 12) return null;
        if (period === 'PM' && hours < 12) hours += 12;
        if (period === 'AM' && hours === 12) hours = 0;
    } else {
        if (hours < 0 || hours > 23) return null;
    }

    let d = new Date();
    d.setHours(hours, minutes, 0, 0);
    return d;
}

function render() {
    const tb = document.getElementById('tb');
    tb.innerHTML = '';

    if (bosses.length === 0) {
        tb.innerHTML = `<tr><td colspan="8" class="empty-state">No bosses added yet. Add one using the form above!</td></tr>`;
        return;
    }

    const lastReset = getLastResetTimestamp();

    bosses.forEach((x, i) => {
        if (x.done && x.lastChecked && x.lastChecked < lastReset) {
            x.done = false;
            x.lastChecked = null;
        }

        let r = tb.insertRow();
        r.dataset.index = i;
        r.dataset.times = x.times;
        if (x.done) r.classList.add('completed');

        let isAlarmActive = x.alarmEnabled !== false;
        let alarmLeadMin = x.alarmLead !== undefined ? x.alarmLead : 0;

        r.innerHTML = `
            <td class="checkbox-cell">
                <input type="checkbox" ${x.done ? 'checked' : ''} onchange="toggleDone(${i}, this.checked)">
            </td>
            <td class="checkbox-cell">
                <div class="alarm-settings-cell">
                    <button class="alarm-toggle ${isAlarmActive ? 'active' : ''}" 
                            title="${isAlarmActive ? 'Disable alarm' : 'Enable alarm'}" 
                            onclick="toggleBossAlarm(${i})">
                        ${isAlarmActive ? '🔔' : '🔕'}
                    </button>
                    ${isAlarmActive ? `
                        <select class="alarm-select" onchange="changeAlarmLead(${i}, this.value)" title="Alert lead time">
                            <option value="0" ${alarmLeadMin === 0 ? 'selected' : ''}>At Spawn</option>
                            <option value="2" ${alarmLeadMin === 2 ? 'selected' : ''}>2m Before</option>
                            <option value="5" ${alarmLeadMin === 5 ? 'selected' : ''}>5m Before</option>
                            <option value="10" ${alarmLeadMin === 10 ? 'selected' : ''}>10m Before</option>
                        </select>
                    ` : ''}
                </div>
            </td>
            <td><strong class="boss-name">${escapeHtml(x.b)}</strong></td>
            <td>${escapeHtml(x.w)}</td>
            <td>${escapeHtml(x.l)}</td>
            <td class="next">-</td>
            <td class="cd">-</td>
            <td class="actions">
                <button class="action-btn" onclick="editBoss(${i})">Edit</button>
                <button class="action-btn del" onclick="delBoss(${i})">Delete</button>
            </td>
        `;
    });
    
    save();
    update();
    searchBoss();
}

function toggleDone(index, isChecked) {
    bosses[index].done = isChecked;
    bosses[index].lastChecked = isChecked ? Date.now() : null;
    save();
    
    let row = document.querySelector(`#tb tr[data-index="${index}"]`);
    if (row) {
        if (isChecked) row.classList.add('completed');
        else row.classList.remove('completed');
    }
    update();
}

function toggleBossAlarm(index) {
    let currentState = bosses[index].alarmEnabled !== false;
    bosses[index].alarmEnabled = !currentState;
    save();
    render();
}

function changeAlarmLead(index, value) {
    bosses[index].alarmLead = parseInt(value, 10);
    save();
    update();
}

function searchBoss() {
    let q = document.getElementById('search').value.toLowerCase();
    let rows = document.querySelectorAll('#tb tr');
    rows.forEach(r => {
        let text = r.textContent.toLowerCase();
        r.style.display = text.includes(q) ? '' : 'none';
    });
}

function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addBoss(e) {
    e.preventDefault();
    const bInput = document.getElementById('b');
    const wInput = document.getElementById('w');
    const lInput = document.getElementById('l');
    const tInput = document.getElementById('t');

    bosses.push({
        b: bInput.value.trim(),
        w: wInput.value.trim(),
        l: lInput.value.trim(),
        times: tInput.value.trim(),
        done: false,
        alarmEnabled: true,
        alarmLead: 0,
        lastChecked: null
    });

    save();

    bInput.value = '';
    wInput.value = '';
    lInput.value = '';
    tInput.value = '';

    render();
}

function editBoss(i) {
    let x = bosses[i];
    let nb = prompt('Boss Name:', x.b); if (nb === null) return;
    let nw = prompt('World / Server:', x.w); if (nw === null) return;
    let nl = prompt('Location:', x.l); if (nl === null) return;
    let nt = prompt('Spawn Times (comma-separated):', x.times); if (nt === null) return;

    bosses[i] = { 
        ...bosses[i], 
        b: nb.trim(), 
        w: nw.trim(), 
        l: nl.trim(), 
        times: nt.trim() 
    };
    save();
    render();
}

function delBoss(i) {
    if (confirm(`Delete ${bosses[i].b}?`)) {
        bosses.splice(i, 1);
        save();
        render();
    }
}

/* --- FILE DOWNLOAD & UPLOAD SYSTEM --- */

function exportToFile() {
    if (bosses.length === 0) {
        alert("No boss data available to download!");
        return;
    }
    
    const jsonString = JSON.stringify(bosses, null, 2);
    const blob = new Blob([jsonString], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    const timestamp = new Date().toISOString().slice(0, 10);
    const downloadAnchor = document.createElement('a');
    downloadAnchor.href = url;
    downloadAnchor.download = `mirage_bosses_${timestamp}.json`;
    
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    
    document.body.removeChild(downloadAnchor);
    URL.revokeObjectURL(url);
}

function importFromFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const parsed = JSON.parse(e.target.result);
            if (Array.isArray(parsed)) {
                if (bosses.length > 0 && !confirm("Loading this file will replace your current boss list. Continue?")) {
                    event.target.value = '';
                    return;
                }
                
                const lastReset = getLastResetTimestamp();

                bosses = parsed.map(item => {
                    let isDone = !!item.done;
                    let lastCheckedTime = item.lastChecked || null;

                    if (isDone && lastCheckedTime && lastCheckedTime < lastReset) {
                        isDone = false;
                        lastCheckedTime = null;
                    }

                    return {
                        b: item.b || '',
                        w: item.w || '',
                        l: item.l || '',
                        times: item.times || '',
                        done: isDone,
                        alarmEnabled: item.alarmEnabled !== false,
                        alarmLead: item.alarmLead || 0,
                        lastChecked: lastCheckedTime
                    };
                });

                save();
                render();
                alert("Boss list loaded successfully!");
            } else {
                alert("Invalid JSON format. File must contain an array of boss data.");
            }
        } catch (err) {
            alert("Failed to parse JSON file: " + err.message);
        }
        event.target.value = '';
    };
    reader.readAsText(file);
}

function update() {
    let now = new Date();
    let rows = [...document.querySelectorAll('#tb tr')].filter(r => r.dataset.times);
    let rowData = [];

    const fiveMinutesMs = 5 * 60 * 1000;

    rows.forEach(r => {
        let index = r.dataset.index;
        let boss = bosses[index];
        let rawTimes = r.dataset.times.split(',');
        
        let dates = rawTimes
            .map(parseTimeToToday)
            .filter(Boolean)
            .sort((a, b) => a - b);

        if (dates.length === 0) {
            r.querySelector('.next').textContent = 'Invalid Time';
            r.querySelector('.cd').textContent = '--:--:--';
            rowData.push({ row: r, diff: Infinity, done: boss?.done });
            return;
        }

        // Target next spawn considering the 5 minute spawn window
        let targetSpawn = dates.find(d => (d - now) > -fiveMinutesMs);

        if (!targetSpawn) {
            targetSpawn = new Date(dates[0]);
            targetSpawn.setDate(targetSpawn.getDate() + 1);
        }

        let diff = targetSpawn - now;
        const cdEl = r.querySelector('.cd');
        const nameEl = r.querySelector('.boss-name');

        // ALARM SYSTEM TRIGGER
        let isAlarmActive = boss.alarmEnabled !== false;
        let leadMs = (boss.alarmLead || 0) * 60 * 1000;
        let alarmTriggerTimeThreshold = diff - leadMs;
        let alarmKey = `${boss.b}_${targetSpawn.getTime()}_${leadMs}`;

        if (isAlarmActive && !boss.done && alarmTriggerTimeThreshold <= 0 && diff >= -fiveMinutesMs) {
            if (!triggeredAlarms[alarmKey]) {
                playBeep();
                document.title = `🚨 ${boss.b} ${leadMs > 0 ? 'spawning soon!' : 'Spawning!'}`;
                triggeredAlarms[alarmKey] = true;
            }
        }

        // SPAWNED STATE (0 to 5 MINUTES AFTER SPAWN)
        if (diff <= 0 && diff >= -fiveMinutesMs) {
            r.classList.add('spawned-highlight');
            if (!r.querySelector('.spawn-badge')) {
                const badge = document.createElement('span');
                badge.className = 'spawn-badge';
                badge.textContent = '⚡ SPAWNED!';
                nameEl.appendChild(badge);
            }

            let absDiff = Math.abs(diff);
            let M = Math.floor(absDiff / 6e4);
            let S = Math.floor((absDiff % 6e4) / 1e3);
            cdEl.textContent = `-${String(M).padStart(2, '0')}:${String(S).padStart(2, '0')}`;
            cdEl.className = 'cd due';
        } else {
            // NORMAL COUNTDOWN STATE (> 5 MINS PASSED OR PRE-SPAWN)
            r.classList.remove('spawned-highlight');
            let badge = r.querySelector('.spawn-badge');
            if (badge) badge.remove();

            let H = Math.floor(diff / 36e5);
            let M = Math.floor((diff % 36e5) / 6e4);
            let S = Math.floor((diff % 6e4) / 1e3);

            cdEl.textContent = `${String(H).padStart(2, '0')}:${String(M).padStart(2, '0')}:${String(S).padStart(2, '0')}`;
            
            if (diff <= 300000 && diff > 0) {
                cdEl.className = 'cd imminent';
            } else {
                cdEl.className = 'cd';
            }
        }

        r.querySelector('.next').textContent = targetSpawn.toLocaleTimeString([], {
            hour: 'numeric',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });

        rowData.push({
            row: r,
            diff: diff,
            done: boss?.done ? 1 : 0
        });
    });

    let needsReorder = false;
    for (let i = 0; i < rowData.length - 1; i++) {
        let curr = rowData[i];
        let next = rowData[i + 1];
        if (curr.done > next.done || (curr.done === next.done && curr.diff > next.diff)) {
            needsReorder = true;
            break;
        }
    }

    if (needsReorder) {
        const tb = document.getElementById('tb');
        rowData.sort((a, b) => {
            if (a.done !== b.done) return a.done - b.done;
            return a.diff - b.diff;
        });
        rowData.forEach(item => tb.appendChild(item.row));
    }
}

render();
setInterval(update, 1000);
</script>
</body>
</html>
