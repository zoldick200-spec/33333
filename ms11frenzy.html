<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Square 11F Frenzy Time</title>
  <style>
    :root {
      --bg-color: #0d0f18;
      --card-bg: #16192b;
      --accent-color: #8a2be2;
      --accent-glow: #00f2fe;
      --text-color: #ffffff;
      --text-dim: #a0a5c0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border: 1px solid rgba(138, 43, 226, 0.3);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5),
                  0 0 20px rgba(138, 43, 226, 0.2);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(45deg, var(--accent-color), var(--accent-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .countdown-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .next-label {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .next-time {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-glow);
      margin-bottom: 15px;
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .time-segment {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .number {
      font-size: 2.5rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 15px;
      border-radius: 8px;
      min-width: 70px;
    }

    .label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 5px;
      text-transform: uppercase;
    }

    .schedule-section h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: var(--text-color);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .schedule-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text-dim);
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .schedule-item.active {
      border-color: var(--accent-glow);
      background: rgba(0, 242, 254, 0.1);
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Magic Square 11F</h1>
    <div class="subtitle">Frenzy Time Tracker</div>

    <div class="countdown-box">
      <div class="next-label">Next Frenzy In</div>
      <div class="next-time" id="next-time-display">Loading...</div>
      
      <div class="timer">
        <div class="time-segment">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-segment">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-segment">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>

    <div class="schedule-section">
      <h2>Daily Schedule</h2>
      <div class="schedule-grid" id="schedule-grid">
        <!-- Generated by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // Schedule hours in 24-hour format (every 3 hours starting at 2 AM)
    const frenzyHours = [2, 5, 8, 11, 14, 17, 20, 23];

    function format12Hour(hour) {
      const period = hour >= 12 ? 'PM' : 'AM';
      const formattedHour = hour % 12 || 12;
      return `${formattedHour}:00 ${period}`;
    }

    function renderSchedule(nextHour) {
      const grid = document.getElementById('schedule-grid');
      grid.innerHTML = '';
      
      frenzyHours.forEach(hour => {
        const item = document.createElement('div');
        item.className = 'schedule-item';
        if (hour === nextHour) {
          item.classList.add('active');
        }
        item.textContent = format12Hour(hour);
        grid.appendChild(item);
      });
    }

    function updateCountdown() {
      const now = new Date();
      let targetTime = new Date();
      
      // Find the next upcoming schedule hour
      let nextHour = frenzyHours.find(hour => {
        const candidate = new Date();
        candidate.setHours(hour, 0, 0, 0);
        return candidate > now;
      });

      // If no remaining hours today, target the first schedule hour tomorrow (2:00 AM)
      if (nextHour === undefined) {
        nextHour = frenzyHours[0];
        targetTime.setDate(targetTime.getDate() + 1);
      }
      
      targetTime.setHours(nextHour, 0, 0, 0);

      const diff = targetTime - now;

      // Calculate time remaining
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      // Update display
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
      document.getElementById('next-time-display').textContent = format12Hour(nextHour);

      renderSchedule(nextHour);
    }

    // Initial run and interval
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
